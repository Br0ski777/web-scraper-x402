name: Publish to MCP Registry

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz && chmod +x mcp-publisher

      - name: Login and Publish
        run: ./mcp-publisher login github-oidc && ./mcp-publisher publish
        continue-on-error: true
